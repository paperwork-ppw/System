 <!DOCTYPE html>
<!---Coding By CoderGirl!--->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>PAPER WORK SYSTEM REGISTER AND WITHDRAW </title>
  <!---Custom Css File!--->
  
</head>
  <style>
     @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500&display=swap');
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}
.main{
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-image: url(https://tinypic.host/images/2023/03/20/Shapes-Abstraction-Background-2466799.jpg);
  background-position: center;
  background-size: cover;
}
.profile-card{
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 400px;
  width: 100%;
  border-radius: 25px;
  padding: 30px;
  border: 1px solid #ffffff40;
  
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}
.image{
  position: relative;
  height: 150px;
  width: 150px;
}
.image .profile-pic{
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}
.data{
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 15px;
}
.data h2{
  font-size: 33px;
  font-weight: 600;
}
span{
  font-size: 18px;
}
.row{
  
  display: flex;
  align-items: center;
  margin-top: 30px;
}
.row .info{
  text-align: center;
  padding: 0 20px;
}
.buttons{
  display: flex;
  align-items: center;
  margin-top: 30px;
}
.buttons .btn{
  color: #fff;
  text-decoration: none;
  margin: 0 20px;
  padding: 8px 25px;
  border-radius: 25px;
  font-size: 18px;
  white-space: nowrap;
  background: linear-gradient(to left, #33ccff 0%, #ff99cc 100%);
}
.buttons .btn:hover{
  box-shadow: inset 0 5px 20px rgba(0,0,0,0.4);
}
  </style>
<body>
  <section class="main">
  <div class="profile-card">
    <div class="image">
      <img src="https://img5.pic.in.th/file/secure-sv1/1000003698d0ee569cd37d236f.jpg" alt="" class="profile-pic">
    </div>
    <div class="data">
      <h3>PAPER WORK SYSTEM</h3>
      <span>ระบบสมัครสมาชิก และ ระบบถอนพ้อยท์</span>
    </div>
    <div class="row">
      <div class="info">
        <h3>REGISTER</h3>
        <span>100+</span>
             </div>
      <div class="info">
        <h3>WITHDRAW</h3>
        <span>100+</span>
      </div>
      <div class="info">
        <h3>MEMBER</h3>
        <span>300+</span>
      </div>
    </div>
    <div class="buttons">
      <a href="https://liff.line.me/2006585180-r581RJ8Z" class="btn">สมัครสมาชิก</a>
      <a href="https://liff.line.me/2006585191-wrb8Kmbm" class="btn">ถอนพ้อยท์</a>
    </div>
  </div>
</section>
</body>
</html>
